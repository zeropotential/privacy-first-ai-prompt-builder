services:
  web:
    build: .
    container_name: ai-persona-architect
    restart: unless-stopped
    expose:
      - "80"

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: ai-persona-caddy
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
